# Paper Tracker Configuration

# arXiv categories to fetch from (these are just API filters, not your topic taxonomy)
arxiv_categories:
  - cs.AI      # Artificial Intelligence
  - cs.LG      # Machine Learning
  - cs.CL      # Computation and Language (NLP/LLMs)
  - cs.MA      # Multiagent Systems
  - cs.NE      # Neural and Evolutionary Computing
  - q-fin.PM   # Portfolio Management
  - q-fin.TR   # Trading and Market Microstructure
  - q-fin.CP   # Computational Finance
  - q-fin.RM   # Risk Management
  - stat.ML    # Statistics - Machine Learning

# AI lab blogs and newsletters to fetch via RSS
blog_feeds:
  - name: "Anthropic"
    url: "https://www.anthropic.com/rss.xml"
  - name: "OpenAI"
    url: "https://openai.com/news/rss.xml"
  - name: "Google DeepMind"
    url: "https://deepmind.google/blog/rss.xml"
  - name: "Meta AI"
    url: "https://ai.meta.com/blog/feed/"
  - name: "Hugging Face"
    url: "https://huggingface.co/blog/feed.xml"
  - name: "Interconnects (Nathan Lambert)"
    url: "https://www.interconnects.ai/feed"
  - name: "Ahead of AI (Sebastian Raschka)"
    url: "https://magazine.sebastianraschka.com/feed"

# Extra keyword filters applied on top of category results
# Papers must match at least one keyword (case-insensitive) to be included
# Leave empty to include all papers from the categories above
keyword_filters:
  - mechanistic interpretability
  - multi-agent
  - multiagent
  - reinforcement learning
  - large language model
  - transformer
  - quantitative finance
  - trading strategy
  - neural network
  - foundation model
  - multimodal
  - interpretability
  - alignment
  - agent

# How many papers to fetch per category per day (max)
papers_per_category: 5

# For the first run, fetch papers from this many days back
# After the first run, reduce this to 2 to stay current
initial_lookback_days: 30

# Trusted sources — papers mentioning these in their abstract get a "trusted" badge
trusted_sources:
  # Big AI labs
  - OpenAI
  - DeepMind
  - Google DeepMind
  - Google Brain
  - Google Research
  - Anthropic
  - Meta AI
  - Meta FAIR
  - Microsoft Research
  - Apple
  - NVIDIA
  - Hugging Face
  - EleutherAI
  - Cohere
  - Mistral
  # Top universities
  - MIT
  - Stanford
  - Carnegie Mellon
  - CMU
  - UC Berkeley
  - Berkeley
  - Oxford
  - Cambridge
  - ETH Zurich
  - Harvard
  - Princeton
  - Caltech
  - Yale
  - University of Toronto
  - Mila
  - NYU
  - Columbia
  - University of Washington
  - Imperial College
  - Tsinghua
  - Peking University

# Claude model for summarization
# claude-haiku-4-5-20251001 = fast & cheap, good for daily volume
# claude-sonnet-4-6 = higher quality, slower, more expensive
summarization_model: claude-haiku-4-5-20251001

# Weekly tag clustering model (runs once a week, less volume)
clustering_model: claude-sonnet-4-6

# Telegram settings
telegram_daily_hour_utc: 8   # Hour to send daily digest (24h UTC)
spaced_repetition_days: [3, 7, 14, 30]  # Days after which to resurface papers
