<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; }
  header { padding: 1.5rem 2rem; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.25rem; font-weight: 600; color: #fff; }
  header span { color: #666; font-size: 0.85rem; }
  .layout { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 60px); }
  .sidebar { border-right: 1px solid #1e1e1e; padding: 1rem; overflow-y: auto; background: #0d0d10; }
  .sidebar h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 0.75rem; }
  .search { width: 100%; background: #1a1a20; border: 1px solid #2a2a35; border-radius: 6px; padding: 0.5rem 0.75rem; color: #e0e0e0; font-size: 0.85rem; outline: none; margin-bottom: 1.25rem; }
  .search:focus { border-color: #5865f2; }
  .filter-group { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
  .filter-btn { padding: 0.2rem 0.6rem; border-radius: 99px; font-size: 0.72rem; cursor: pointer; background: #1e1e28; border: 1px solid #2e2e3e; color: #aaa; transition: all 0.15s; user-select: none; }
  .filter-btn:hover { background: #2a2a38; color: #fff; }
  .filter-btn.active { border-color: #5865f2; color: #fff; }
  .filter-btn.prio-btn.active { background: #b8860b; border-color: #daa520; }
  .filter-btn.unread-btn.active { background: #1a3a1a; border-color: #3a7a3a; }
  .trusted-badge { font-size: 0.65rem; background: #1a2535; border: 1px solid #2a4060; color: #6a9fd8; border-radius: 4px; padding: 0.1rem 0.4rem; margin-left: 0.4rem; vertical-align: middle; }
  .source-badge { font-size: 0.65rem; background: #251f12; border: 1px solid #5a4218; color: #d2a650; border-radius: 4px; padding: 0.1rem 0.4rem; margin-left: 0.4rem; vertical-align: middle; }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
  .tag { padding: 0.2rem 0.6rem; border-radius: 99px; font-size: 0.72rem; cursor: pointer; background: #1e1e28; border: 1px solid #2e2e3e; color: #aaa; transition: all 0.15s; user-select: none; }
  .tag:hover, .tag.active { background: #5865f2; border-color: #5865f2; color: #fff; }
  .tag .count { opacity: 0.6; margin-left: 3px; }
  .main { overflow-y: auto; padding: 1.5rem 2rem; }
  .controls { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .sort-btn { background: #1a1a20; border: 1px solid #2a2a35; border-radius: 6px; padding: 0.4rem 0.9rem; color: #aaa; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
  .sort-btn.active, .sort-btn:hover { background: #2a2a35; color: #fff; }
  .result-count { color: #555; font-size: 0.8rem; margin-left: auto; }
  .papers { display: flex; flex-direction: column; gap: 0.75rem; }
  .paper-card { background: #14141a; border: 1px solid #1e1e28; border-radius: 10px; padding: 1.1rem 1.25rem; transition: border-color 0.15s; }
  .paper-card:hover { border-color: #3a3a50; }
  .paper-card.expanded { border-color: #5865f2; }
  .paper-card.is-read { opacity: 0.5; }
  .paper-card.is-prio { border-left: 3px solid #daa520; }
  .card-header { display: flex; align-items: flex-start; gap: 0.75rem; }
  .card-main { flex: 1; cursor: pointer; }
  .card-date { font-size: 0.72rem; color: #555; white-space: nowrap; margin-top: 2px; min-width: 5.8rem; line-height: 1.35; }
  .date-primary { color: #8b8b98; }
  .date-secondary { color: #555; }
  .card-title { font-size: 0.95rem; font-weight: 500; color: #e8e8e8; line-height: 1.4; }
  .card-authors { font-size: 0.78rem; color: #666; margin-top: 0.3rem; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.65rem; }
  .card-tag { padding: 0.15rem 0.5rem; border-radius: 99px; font-size: 0.68rem; background: #1e1e28; color: #888; border: 1px solid #2a2a38; }
  .card-tag.custom { background: #1a2a1a; border-color: #2a4a2a; color: #7a9a7a; }
  .card-actions { display: flex; flex-direction: column; gap: 0.4rem; align-items: flex-end; flex-shrink: 0; }
  .action-btn { background: none; border: 1px solid #2a2a38; border-radius: 6px; padding: 0.25rem 0.5rem; font-size: 0.75rem; cursor: pointer; color: #666; transition: all 0.15s; white-space: nowrap; }
  .action-btn:hover { border-color: #444; color: #aaa; }
  .action-btn.prio-active { border-color: #daa520; color: #daa520; }
  .action-btn.read-active { border-color: #3a7a3a; color: #5a9a5a; }
  .card-body { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #1e1e28; display: none; }
  .card-body.show { display: block; }
  .card-body p { font-size: 0.85rem; color: #bbb; line-height: 1.65; }
  .card-links { display: flex; gap: 0.75rem; margin-top: 0.85rem; }
  .card-links a { font-size: 0.78rem; color: #5865f2; text-decoration: none; }
  .card-links a:hover { text-decoration: underline; }
  .custom-tag-row { display: flex; gap: 0.4rem; margin-top: 0.75rem; }
  .custom-tag-input { flex: 1; background: #1a1a20; border: 1px solid #2a2a35; border-radius: 6px; padding: 0.3rem 0.6rem; color: #e0e0e0; font-size: 0.78rem; outline: none; }
  .custom-tag-input:focus { border-color: #5865f2; }
  .custom-tag-add { background: #1e1e28; border: 1px solid #2a2a38; border-radius: 6px; padding: 0.3rem 0.6rem; color: #aaa; font-size: 0.78rem; cursor: pointer; }
  .custom-tag-add:hover { background: #2a2a38; }
  .custom-tag-remove { cursor: pointer; margin-left: 3px; opacity: 0.6; }
  .custom-tag-remove:hover { opacity: 1; }
  .empty { text-align: center; padding: 4rem 2rem; color: #555; }
  .empty h2 { font-size: 1rem; margin-bottom: 0.5rem; color: #666; }
  .graph-toggle { background: #5865f2; border: none; border-radius: 6px; padding: 0.4rem 0.9rem; color: #fff; font-size: 0.8rem; cursor: pointer; }
  #graph-container { display: none; position: fixed; inset: 0; background: #0a0a0f; z-index: 100; }
  #graph-container.show { display: block; }
  #graph-close { position: absolute; top: 1rem; right: 1rem; background: #1e1e28; border: 1px solid #333; color: #fff; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; z-index: 101; }
  #graph-svg { width: 100%; height: 100%; }
  .node circle { cursor: pointer; }
  .node text { font-size: 11px; fill: #aaa; pointer-events: none; }
  .link { stroke: #2a2a40; stroke-width: 1; }
</style>
</head>
<body>

<header>
  <h1>Paper Tracker</h1>
  <span id="paper-count-header"></span>
  <button class="graph-toggle" onclick="openGraph()">Tag Graph</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <input class="search" id="search" placeholder="Search titles, authors..." oninput="filterPapers()">
    <h3>Filter</h3>
    <div class="filter-group" style="margin-bottom:1.5rem">
      <span class="filter-btn prio-btn" onclick="toggleFilter('prio', this)">⭐ Priority</span>
      <span class="filter-btn unread-btn" onclick="toggleFilter('unread', this)">Unread</span>
      <span class="filter-btn" onclick="toggleFilter('trusted', this)">🔬 Trusted</span>
      <span class="filter-btn" onclick="toggleFilter('blogs', this)">Blogs</span>
    </div>
    <h3>Tags</h3>
    <div class="tag-cloud" id="tag-cloud"></div>
  </aside>
  <main class="main">
    <div class="controls">
      <button class="sort-btn active" onclick="setSort('date', this)">Recently added</button>
      <button class="sort-btn" onclick="setSort('title', this)">A–Z</button>
      <button class="sort-btn" onclick="setSort('prio', this)">Priority first</button>
      <span class="result-count" id="result-count"></span>
    </div>
    <div class="papers" id="papers"></div>
  </main>
</div>

<div id="graph-container">
  <button id="graph-close" onclick="closeGraph()">✕ Close</button>
  <svg id="graph-svg"></svg>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
let allPapers = [];
let activeTags = new Set();
let activeFilters = new Set();
let sortMode = 'date';

// localStorage helpers
function getRead() { return new Set(JSON.parse(localStorage.getItem('papers_read') || '[]')); }
function getPrio() { return new Set(JSON.parse(localStorage.getItem('papers_prio') || '[]')); }
function getCustomTags() { return JSON.parse(localStorage.getItem('papers_custom_tags') || '{}'); }
function saveRead(s) { localStorage.setItem('papers_read', JSON.stringify([...s])); }
function savePrio(s) { localStorage.setItem('papers_prio', JSON.stringify([...s])); }
function saveCustomTags(o) { localStorage.setItem('papers_custom_tags', JSON.stringify(o)); }

function paperKey(p) { return p.url || p.title; }

function toggleRead(key, event) {
  event.stopPropagation();
  const read = getRead();
  read.has(key) ? read.delete(key) : read.add(key);
  saveRead(read);
  filterPapers();
}

function togglePrio(key, event) {
  event.stopPropagation();
  const prio = getPrio();
  prio.has(key) ? prio.delete(key) : prio.add(key);
  savePrio(prio);
  filterPapers();
}

function addCustomTag(key, event) {
  event.stopPropagation();
  const input = document.getElementById('tag-input-' + CSS.escape(key));
  const val = input.value.trim().toLowerCase().replace(/\s+/g, '-');
  if (!val) return;
  const ct = getCustomTags();
  if (!ct[key]) ct[key] = [];
  if (!ct[key].includes(val)) ct[key].push(val);
  saveCustomTags(ct);
  input.value = '';
  filterPapers();
}

function removeCustomTag(key, tag, event) {
  event.stopPropagation();
  const ct = getCustomTags();
  if (ct[key]) ct[key] = ct[key].filter(t => t !== tag);
  saveCustomTags(ct);
  filterPapers();
}

function toggleFilter(name, btn) {
  if (activeFilters.has(name)) { activeFilters.delete(name); btn.classList.remove('active'); }
  else { activeFilters.add(name); btn.classList.add('active'); }
  filterPapers();
}

async function loadPapers() {
  try {
    const resp = await fetch('papers.json');
    allPapers = await resp.json();
    renderTagCloud();
    filterPapers();
    document.getElementById('paper-count-header').textContent = `${allPapers.length} papers`;
  } catch(e) {
    document.getElementById('papers').innerHTML = '<div class="empty"><h2>No papers loaded yet</h2><p>Run the daily workflow to fetch papers.</p></div>';
  }
}

function renderTagCloud() {
  const tagCount = {};
  allPapers.forEach(p => (p.tags || []).forEach(t => { tagCount[t] = (tagCount[t]||0) + 1; }));
  const sorted = Object.entries(tagCount).sort((a,b) => b[1]-a[1]);
  const cloud = document.getElementById('tag-cloud');
  cloud.innerHTML = sorted.map(([tag, count]) =>
    `<span class="tag" data-tag="${tag}" onclick="toggleTag('${tag}')">${tag}<span class="count">${count}</span></span>`
  ).join('');
}

function toggleTag(tag) {
  if (activeTags.has(tag)) activeTags.delete(tag);
  else activeTags.add(tag);
  document.querySelectorAll('.tag').forEach(el => {
    el.classList.toggle('active', activeTags.has(el.dataset.tag));
  });
  filterPapers();
}

function setSort(mode, btn) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterPapers();
}

function filterPapers() {
  const query = document.getElementById('search').value.toLowerCase();
  const read = getRead();
  const prio = getPrio();
  const ct = getCustomTags();

  let filtered = allPapers.filter(p => {
    const key = paperKey(p);
    const allTags = [...(p.tags||[]), ...(ct[key]||[])];
    const matchQuery = !query ||
      p.title.toLowerCase().includes(query) ||
      (p.authors||'').toLowerCase().includes(query) ||
      allTags.some(t => t.includes(query));
    const matchTags = activeTags.size === 0 || [...activeTags].every(t => allTags.includes(t));
    const matchPrio = !activeFilters.has('prio') || prio.has(key);
    const matchUnread = !activeFilters.has('unread') || !read.has(key);
    const matchTrusted = !activeFilters.has('trusted') || !!p.trusted;
    const matchBlogs = !activeFilters.has('blogs') || p.source === 'blog';
    return matchQuery && matchTags && matchPrio && matchUnread && matchTrusted && matchBlogs;
  });

  if (sortMode === 'date') filtered.sort((a,b) => sortDate(b).localeCompare(sortDate(a)) || (b.published || '').localeCompare(a.published || ''));
  else if (sortMode === 'title') filtered.sort((a,b) => a.title.localeCompare(b.title));
  else if (sortMode === 'prio') filtered.sort((a,b) => {
    const ap = prio.has(paperKey(a)) ? 0 : 1;
    const bp = prio.has(paperKey(b)) ? 0 : 1;
    return ap - bp || sortDate(b).localeCompare(sortDate(a)) || (b.published || '').localeCompare(a.published || '');
  });

  document.getElementById('result-count').textContent = `${filtered.length} paper${filtered.length !== 1 ? 's' : ''}`;
  renderPapers(filtered, read, prio, ct);
}

function renderPapers(papers, read, prio, ct) {
  const container = document.getElementById('papers');
  if (!papers.length) {
    container.innerHTML = '<div class="empty"><h2>No papers match</h2><p>Try different filters.</p></div>';
    return;
  }
  container.innerHTML = papers.map((p, i) => {
    const key = paperKey(p);
    const isRead = read.has(key);
    const isPrio = prio.has(key);
    const customTags = ct[key] || [];
    const keyEsc = escAttr(key);
    const cardClasses = ['paper-card', isRead ? 'is-read' : '', isPrio ? 'is-prio' : ''].filter(Boolean).join(' ');
    const added = p.date_added ? p.date_added.slice(0,10) : '';
    const published = p.published ? p.published.slice(0,10) : '';
    const source = p.source || 'arxiv';
    const sourceName = p.source_name || (source === 'blog' ? 'Blog' : 'arXiv');
    const dateHtml = added
      ? `<div class="date-primary">Added ${escHtml(added)}</div>${published && published !== added ? `<div class="date-secondary">${source === 'blog' ? 'Posted' : 'arXiv'} ${escHtml(published)}</div>` : ''}`
      : escHtml(published);
    const sourceBadge = source === 'blog' ? `<span class="source-badge">Blog</span>` : '';
    return `
    <div class="${cardClasses}" id="card-${i}">
      <div class="card-header">
        <div class="card-date">${dateHtml}</div>
        <div class="card-main" onclick="toggleCard(${i})">
          <div class="card-title">${escHtml(p.title)}${sourceBadge}${p.trusted ? `<span class="trusted-badge">🔬 ${escHtml(p.trusted)}</span>` : ''}</div>
          <div class="card-authors">${escHtml(p.authors||'')}</div>
          <div class="card-tags">
            ${(p.tags||[]).map(t => `<span class="card-tag">${t}</span>`).join('')}
            ${customTags.map(t => `<span class="card-tag custom">${escHtml(t)}<span class="custom-tag-remove" onclick="removeCustomTag('${keyEsc}','${escAttr(t)}',event)"> ✕</span></span>`).join('')}
          </div>
        </div>
        <div class="card-actions">
          <button class="action-btn ${isPrio ? 'prio-active' : ''}" onclick="togglePrio('${keyEsc}',event)">⭐ ${isPrio ? 'Prio' : 'Prio'}</button>
          <button class="action-btn ${isRead ? 'read-active' : ''}" onclick="toggleRead('${keyEsc}',event)">${isRead ? '✓ Read' : 'Mark read'}</button>
        </div>
      </div>
      <div class="card-body" id="body-${i}">
        <p>${escHtml(p.summary||'')}</p>
        <div class="card-links">
          ${p.url ? `<a href="${p.url}" target="_blank">${source === 'blog' ? escHtml(sourceName) : 'arXiv'}</a>` : ''}
          ${p.pdf ? `<a href="${p.pdf}" target="_blank">PDF</a>` : ''}
        </div>
        <div class="custom-tag-row">
          <input class="custom-tag-input" id="tag-input-${keyEsc}" placeholder="Add tag..." onkeydown="if(event.key==='Enter')addCustomTag('${keyEsc}',event)" onclick="event.stopPropagation()">
          <button class="custom-tag-add" onclick="addCustomTag('${keyEsc}',event)">+ Tag</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(i) {
  const body = document.getElementById(`body-${i}`);
  const card = document.getElementById(`card-${i}`);
  if (body) { body.classList.toggle('show'); card.classList.toggle('expanded'); }
}

function sortDate(p) {
  return p.date_added || p.published || '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

// Tag graph using D3
function openGraph() {
  document.getElementById('graph-container').classList.add('show');
  drawGraph();
}
function closeGraph() {
  document.getElementById('graph-container').classList.remove('show');
}

function drawGraph() {
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();
  const w = window.innerWidth, h = window.innerHeight;

  const tagCount = {};
  const coOccur = {};
  allPapers.forEach(p => {
    const tags = p.tags || [];
    tags.forEach(t => { tagCount[t] = (tagCount[t]||0) + 1; });
    for (let i = 0; i < tags.length; i++) for (let j = i+1; j < tags.length; j++) {
      const key = [tags[i],tags[j]].sort().join('||');
      coOccur[key] = (coOccur[key]||0) + 1;
    }
  });

  const topTags = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,60).map(([t])=>t);
  const nodes = topTags.map(id => ({ id, count: tagCount[id] }));
  const links = Object.entries(coOccur)
    .filter(([k, v]) => { const [a,b] = k.split('||'); return topTags.includes(a) && topTags.includes(b) && v > 0; })
    .map(([k, value]) => { const [source,target]=k.split('||'); return {source,target,value}; });

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(w/2, h/2))
    .force('collision', d3.forceCollide(30));

  const g = svg.append('g');
  svg.call(d3.zoom().on('zoom', e => g.attr('transform', e.transform)));

  g.append('g').selectAll('line').data(links).join('line').attr('class','link')
    .attr('stroke-width', d => Math.sqrt(d.value));

  const node = g.append('g').selectAll('.node').data(nodes).join('g').attr('class','node')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end', (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  const color = d3.scaleSequential(d3.interpolateCool).domain([1, Math.max(...Object.values(tagCount))]);
  node.append('circle').attr('r', d => Math.max(5, Math.min(20, 4 + d.count * 1.5)))
    .attr('fill', d => color(d.count)).attr('fill-opacity', 0.85);
  node.append('text').attr('x', 0).attr('y', d => Math.max(5, Math.min(20, 4+d.count*1.5))+12)
    .attr('text-anchor','middle').text(d=>d.id);

  sim.on('tick', () => {
    g.selectAll('line').attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform', d=>`translate(${d.x},${d.y})`);
  });
}

loadPapers();
</script>
</body>
</html>
