name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'papers/**'
      - 'web/**'
      - 'scripts/build_web.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build papers.json
        run: pip install pyyaml && python scripts/build_web.py

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - uses: actions/deploy-pages@v4
        id: deployment
